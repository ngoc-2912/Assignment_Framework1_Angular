<nav class="navbar navbar-expand-lg navbar-light sticky-top site-navbar">
  <div class="container">
    <a class="navbar-brand fw-bold" routerLink="/">SmartNest</a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#mainNavbar"
      aria-controls="mainNavbar"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div id="mainNavbar" class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-lg-2">
        <li class="nav-item">
          <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
            Trang chủ
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/shop" routerLinkActive="active">Cửa hàng</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/checkout" routerLinkActive="active">Thanh toán</a>
        </li>
      </ul>

      <div class="d-flex flex-column flex-lg-row align-items-lg-center gap-2">
        <a class="btn btn-outline-dark position-relative" routerLink="/cart">
          <i class="bi bi-cart3 me-1"></i> Giỏ hàng
          <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill text-bg-danger">
            {{ cartCount() }}
          </span>
        </a>

        @if (isAuthenticated()) {
          <div class="d-flex align-items-center gap-2">
            <span class="small text-secondary d-none d-lg-inline">Xin chao, {{ user()?.fullName }}</span>
            <button type="button" class="btn btn-dark" (click)="logout()">Đăng xuất</button>
          </div>
        } @else {
          <div class="d-flex gap-2">
            <a class="btn btn-outline-secondary" routerLink="/login">Đăng nhập</a>
            <a class="btn btn-dark" routerLink="/register">Đăng ký</a>

  </div>
