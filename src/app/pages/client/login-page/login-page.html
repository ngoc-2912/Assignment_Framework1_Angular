<section class="auth-shell mx-auto">
  <div class="card border-0 shadow-sm">
    <div class="card-body p-4 p-lg-5">
      <h1 class="h3 fw-bold mb-2">Đăng nhập tài khoản</h1>
      <p class="text-secondary mb-4">Theo dõi đơn hàng, lưu danh sách yêu thích và nhận ưu đãi.</p>

      <form>
        <div class="mb-3">
          <label for="login-email" class="form-label">Email</label>
          <input id="login-email" class="form-control" type="email" placeholder="Vui lòng nhập email" />
        </div>

        <div class="mb-4">
          <label for="login-password" class="form-label">Mật khẩu</label>
          <input id="login-password" class="form-control" type="password" placeholder="Vui lòng nhập mật khẩu" />
        </div>

        <button class="btn btn-dark w-100" type="button">Đăng nhập</button>
      </form>

      <p class="mt-4 mb-0 text-secondary">
        Chưa có tài khoản?
        <a routerLink="/register" class="fw-semibold">Đăng ký ngay</a>
      </p>
    </div>
  </div>
</section>
