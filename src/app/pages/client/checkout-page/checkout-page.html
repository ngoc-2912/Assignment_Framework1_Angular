<h1 class="h2 fw-bold mb-4">Thanh toán</h1>

<div class="row g-4">
  <div class="col-lg-7">
    <form class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <h2 class="h5 fw-bold mb-3">Thông tin giao hàng</h2>

        <div class="mb-3">
          <label for="fullName" class="form-label">Họ và tên</label>
          <input id="fullName" class="form-control" type="text" placeholder="Nguyen Van A" />
        </div>

        <div class="row g-3">
          <div class="col-md-6">
            <label for="email" class="form-label">Email</label>
            <input id="email" class="form-control" type="email" placeholder="you@email.com" />
          </div>
          <div class="col-md-6">
            <label for="phone" class="form-label">Số điện thoại</label>
            <input id="phone" class="form-control" type="tel" placeholder="09xxxxxxxx" />
          </div>
        </div>

        <div class="my-3">
          <label for="address" class="form-label">Địa chỉ nhận hàng</label>
          <textarea id="address" rows="3" class="form-control" placeholder="Số nhà, đường, phường/xã, quận/huyện"></textarea>
        </div>

        <div class="mb-3">
          <label for="paymentMethod" class="form-label">Phương thức thanh toán</label>
          <select id="paymentMethod" class="form-select">
            <option selected>Thanh toán khi nhận hàng (COD)</option>
            <option>Chuyển khoản ngân hàng</option>
            <option>Ví điện tử MoMo</option>
          </select>
        </div>

        <div class="mb-3">
          <label for="note" class="form-label">Ghi chú (tùy chọn)</label>
          <textarea id="note" rows="2" class="form-control" placeholder="Ví dụ: giao giờ hành chính"></textarea>
        </div>

        <button class="btn btn-dark w-100" type="button">Đặt hàng ngay</button>
      </div>
    </form>
  </div>

  <div class="col-lg-5">
    <aside class="card border-0 shadow-sm">
      <div class="card-body">
        <h2 class="h5 fw-bold mb-3">Đơn hàng của bạn</h2>

        <ul class="list-group list-group-flush mb-3">
          <li class="list-group-item px-0 d-flex justify-content-between gap-2">
            <span>Nồi chiên không dầu Philips HD9257 x 1</span>
            <strong>2.690.000 VND</strong>
          </li>
          <li class="list-group-item px-0 d-flex justify-content-between gap-2">
            <span>Máy lọc không khí Sharp FP-Z40E x 1</span>
            <strong>3.290.000 VND</strong>
          </li>
        </ul>
        <div class="d-flex justify-content-between">
          <span>Tổng thanh toán</span>
          <strong class="fs-5">5.980.000 VND</strong>
        </div>
      </div>
    </aside>
  </div>
</div>
