<section class="auth-shell mx-auto">
  <div class="card border-0 shadow-sm">
    <div class="card-body p-4 p-lg-5">
      <h1 class="h3 fw-bold mb-2">Tạo tài khoản mới</h1>
      <p class="text-secondary mb-4">Trở thành thành viên để nhận giá ưu đãi và cập nhật sản phẩm mới sớm nhất.</p>

      <form>
        <div class="mb-3">
          <label for="register-name" class="form-label">Họ và tên</label>
          <input id="register-name" class="form-control" type="text" placeholder="Vui lòng nhập họ và tên" />
        </div>

        <div class="mb-3">
          <label for="register-email" class="form-label">Email</label>
          <input id="register-email" class="form-control" type="email" placeholder="Vui lòng nhập email" />
        </div>

        <div class="mb-3">
          <label for="register-password" class="form-label">Mật khẩu</label>
          <input id="register-password" class="form-control" type="password" placeholder="Vui lòng nhập mật khẩu" />
        </div>

        <div class="form-check mb-4">
          <input id="agree" class="form-check-input" type="checkbox" />
          <label for="agree" class="form-check-label">Tôi đồng ý với điều khoản sử dụng và chính sách bảo mật.</label>
        </div>

        <button class="btn btn-dark w-100" type="button">Đăng ký</button>
      </form>

      <p class="mt-4 mb-0 text-secondary">
        Đã có tài khoản?
        <a routerLink="/login" class="fw-semibold">Đăng nhập</a>
      </p>
    </div>
  </div>
</section>
