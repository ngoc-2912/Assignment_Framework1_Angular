<div class="container">
  <p>Quản lý sản phẩm > <strong>Thêm sản phẩm</strong></p>
  <div class="form border rounded p-4 bg-light mx-auto">
    <h2 class="text-center mb-4">Thêm sản phẩm</h2>

    <form class="d-flex flex-column gap-3">
      <div>
        <label class="form-label">Tên sản phẩm</label>
        <input type="text" class="form-control input-luxury" placeholder="Nhập tên sản phẩm..." />
      </div>

      <div>
        <label class="form-label">Giá</label>
        <input type="number" class="form-control input-luxury" placeholder="Nhập giá..." />
      </div>

      <div>
        <label class="form-label">Danh mục</label>
        <select class="form-select input-luxury">
          <option>Chọn danh mục</option>
          <option>Nhà bếp</option>
          <option>Điện tử</option>
        </select>
      </div>

      <div>
        <label class="form-label">Trạng thái</label>
        <select class="form-select input-luxury">
          <option>Còn hàng</option>
          <option>Hết hàng</option>
        </select>
      </div>

      <div>
        <label class="form-label">Ảnh sản phẩm</label>
        <input type="file" class="form-control input-luxury" />
      </div>

      <div>
        <label class="form-label">Mô tả</label>
        <textarea rows="4" class="form-control input-luxury" placeholder="Nhập mô tả..."></textarea>
      </div>

      <button class="btn btn-primary mt-3">Thêm</button>
    </form>
  </div>
</div>
