<div class="container py-4">

  <p>Quản lý danh mục > <strong>Thêm danh mục</strong></p>

  <div class="form border rounded p-4 bg-light mx-auto">
    <h2 class="text-center mb-4">Thêm danh mục</h2>

    <form class="d-flex flex-column gap-3">

      <!-- Tên danh mục -->
      <div>
        <label class="form-label">Tên danh mục</label>
        <input type="text" class="form-control" placeholder="Nhập tên danh mục..." />
      </div>

      <!-- Slug -->
      <div>
        <label class="form-label">Slug</label>
        <input type="text" class="form-control" placeholder="vi-du: nha-bep" />
      </div>

      <!-- Trạng thái -->
      <div>
        <label class="form-label">Trạng thái</label>
        <select class="form-select">
          <option selected>Hiển thị</option>
          <option>Ẩn</option>
        </select>
      </div>

      <!-- Mô tả -->
      <div>
        <label class="form-label">Mô tả</label>
        <textarea rows="3" class="form-control" placeholder="Nhập mô tả...">Danh mục đồ nhà bếp</textarea>
      </div>

      <!-- Button -->
      <button class="btn btn-primary mt-3">
        Thêm
      </button>

    </form>
  </div>

</div>
